spring:
  application:
    name: golf-leaderboard

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:golf_leaderboard}
    username: ${DB_USER:golf_user}
    password: ${DB_PASSWORD:golf_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

server:
  port: 8080

# JWT config (override via env in production)
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-min-32-chars}
  expiration-ms: 86400000  # 24 hours

# CORS - allow frontend
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
